include:
  - compose.infra.yml

services:
  frontend:
    build: ./frontend_v2
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    develop:
      watch:
        - action: sync
          path: ./frontend_v2/src
          target: /app/src
    environment:
      - VITE_BACKEND_URL=http://localhost:${BACKEND_PORT:-8001}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5173"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app/src
    environment:
      - PIIGHOST_API_URL=http://piighost-api:8000
      - PIIGHOST_API_KEY=${PIIGHOST_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-openai:gpt-5.4-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=postgresql://piighost:piighost@postgres:5432/piighost_chat
    depends_on:
      piighost-api:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 5s
      timeout: 5s
      retries: 20
