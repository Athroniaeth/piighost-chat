services:
  frontend:
    build: ./frontend_v2
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    develop:
      watch:
        - action: sync
          path: ./frontend_v2/src
          target: /app/src
    environment:
      - VITE_BACKEND_URL=http://localhost:${BACKEND_PORT:-8001}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5173"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app/src
    environment:
      - PIIGHOST_API_URL=http://piighost-api:8000
      - PIIGHOST_API_KEY=${PIIGHOST_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-openai:gpt-5.4-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=postgresql://piighost:piighost@postgres:5432/piighost_chat
    depends_on:
      piighost-api:
        condition: service_started
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 5s
      timeout: 5s
      retries: 20

  piighost-api:
    image: ghcr.io/athroniaeth/piighost-api:latest
    environment:
      - REDIS_URL=redis://redis:6379
      - SECRET_PEPPER=${SECRET_PEPPER:-}
      - API_KEY_default=${PIIGHOST_API_KEY:-}
    volumes:
      - ./pipeline.py:/app/pipeline.py
      - huggingface-cache:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=piighost
      - POSTGRES_PASSWORD=piighost
      - POSTGRES_DB=piighost_chat
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U piighost -d piighost_chat"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  redis-data:
  huggingface-cache:
  postgres-data:
