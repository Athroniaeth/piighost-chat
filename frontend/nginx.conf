server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA history API fallback: every unknown path returns index.html so the
    # React router can handle the route client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively; index.html stays uncached so
    # deploys are picked up immediately.
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
